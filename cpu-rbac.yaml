apiVersion: v1
kind: ServiceAccount
metadata:
  name: cpu-spike-sa
  namespace: ecommerce

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cpu-spike-role
  namespace: ecommerce

rules:
- apiGroups: [""]
  resources: ["pods","pods/exec"]
  verbs: ["get","list","create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cpu-spike-rb
  namespace: ecommerce

subjects:
- kind: ServiceAccount
  name: cpu-spike-sa
  namespace: ecommerce

roleRef:
  kind: Role
  name: cpu-spike-role
  apiGroup: rbac.authorization.k8s.io